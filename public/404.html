<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>PAPS-IMS</title>
    <script>
      // GitHub Pages SPA 라우팅: 404를 index.html로 리디렉션
      const repo = "/paps-ims";
      const path = window.location.pathname.replace(repo, "") || "/";
      const search = window.location.search;
      const hash = window.location.hash;
      window.location.replace(
        repo + "/?redirect=" + encodeURIComponent(path + search + hash)
      );
    </script>
  </head>
  <body></body>
</html>
